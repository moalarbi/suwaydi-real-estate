<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكاتب العقارات — حي السويدي، الرياض</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F2EDE3;
    --card-bg:   #FAF6EC;
    --ink:       #3A2E20;
    --accent:    #C97554;
    --border:    3px solid #3A2E20;
    --shadow:    5px 5px 0px #2A2218;
    --shadow-sm: 3px 3px 0px #2A2218;
    --radius:    4px;
    --font:      'IBM Plex Sans Arabic', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    padding: 24px 16px 60px;
  }

  /* ── Header ── */
  header {
    max-width: 860px;
    margin: 0 auto 36px;
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    background: var(--accent);
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  header .badge {
    display: inline-block;
    background: var(--ink);
    color: #F2EDE3;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    color: #FAF6EC;
    line-height: 1.25;
    margin-bottom: 8px;
  }
  header p {
    font-size: 13px;
    color: rgba(250,246,236,0.85);
  }

  /* ── Stats bar ── */
  .stats-bar {
    max-width: 860px;
    margin: 0 auto 28px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat {
    flex: 1 1 120px;
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    background: var(--card-bg);
    padding: 14px 18px;
    text-align: center;
  }
  .stat strong { display: block; font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat span   { font-size: 11px; color: var(--ink); opacity: 0.7; }

  /* ── Search bar ── */
  .search-wrap {
    max-width: 860px;
    margin: 0 auto 28px;
  }
  .search-wrap input {
    width: 100%;
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    background: var(--card-bg);
    padding: 12px 18px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: box-shadow 0.15s;
  }
  .search-wrap input:focus { box-shadow: 6px 6px 0 var(--accent); }
  .search-wrap input::placeholder { opacity: 0.5; }

  /* ── Grid ── */
  .grid {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ── Card ── */
  .card {
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    background: var(--card-bg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0px #2A2218;
  }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-name { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; }

  .rating {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--ink);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .rating .star { color: var(--accent); font-size: 12px; }

  .card-meta { display: flex; flex-direction: column; gap: 6px; }
  .meta-row  { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; }
  .meta-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .meta-val  { color: var(--ink); opacity: 0.8; line-height: 1.4; }

  .hours-tag {
    font-size: 11px;
    background: #eee6d7;
    border: 1px solid #c9b89a;
    border-radius: 2px;
    padding: 2px 7px;
    color: var(--ink);
    width: fit-content;
  }

  .card-footer { border-top: 2px solid var(--ink); padding-top: 12px; margin-top: auto; }

  .btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    color: #FAF6EC;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-call:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #2A2218; }
  .btn-call:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #2A2218; }

  .btn-maps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    color: var(--ink);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-maps:hover { background: rgba(58,46,32,0.06); }

  .no-phone {
    text-align: center;
    font-size: 12px;
    color: var(--ink);
    opacity: 0.4;
    padding: 8px 0 4px;
  }

  /* ── No results ── */
  #no-results {
    display: none;
    max-width: 860px;
    margin: 0 auto;
    text-align: center;
    padding: 40px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--card-bg);
    font-size: 15px;
    opacity: 0.6;
  }

  /* ── Footer ── */
  footer {
    max-width: 860px;
    margin: 40px auto 0;
    border-top: var(--border);
    padding-top: 16px;
    font-size: 12px;
    opacity: 0.5;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 8px; }
    header { padding: 20px 20px 18px; }
  }
</style>
</head>
<body>

function stars(r) {
  const full = Math.floor(r);
  const half = r - full >= 0.5;
  let s = '';
  for (let i=0;i<full;i++) s+='★';
  if (half) s+='½';
  return s;
}

function mapsUrl(lat, lng, name) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}&query_place_id=${encodeURIComponent(name)}`;
}

function renderCards(list) {
  const grid = document.getElementById('cards-grid');
  const noRes = document.getElementById('no-results');
  grid.innerHTML = '';
  if (list.length === 0) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  list.forEach(o => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${o.name}</div>
        <div class="rating">
          <span class="star">★</span>
          ${o.rating.toFixed(1)}
          <span style="opacity:.6;font-weight:400">(${o.reviews})</span>
        </div>
      </div>
      <div class="card-meta">
        <div class="meta-row">
          <span class="meta-icon">📍</span>
          <span class="meta-val">${o.address}</span>
        </div>
        <div class="meta-row">
          <span class="meta-icon">🕐</span>
          <span class="meta-val">${o.hours}</span>
        </div>
      </div>
      <div class="card-footer">
        ${o.phone
          ? `<a class="btn-call" href="tel:${o.phone}">📞 اتصل الآن — ${o.phoneDisplay}</a>`
          : `<div class="no-phone">📵 رقم غير متوفر</div>`
        }
        <a class="btn-maps" href="${mapsUrl(o.lat, o.lng, o.name)}" target="_blank" rel="noopener">
          🗺️ عرض على الخريطة
        </a>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = q
    ? offices.filter(o =>
        o.name.toLowerCase().includes(q) ||
        o.address.toLowerCase().includes(q)
      )
    : offices;
  renderCards(filtered);
}

// Update counts
document.getElementById('total-count').textContent = offices.length;
document.getElementById('phone-count').textContent = offices.filter(o => o.phone).length;

renderCards(offices);
